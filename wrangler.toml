name = "mcpeapsunterstrichhd-dev"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"
workers_dev = true
preview_urls = true

[placement]
mode = "smart"

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# ── Production (main branch) ──
[[routes]]
pattern = "www.mcpeapsunterstrichhd.dev"
custom_domain = true

[[routes]]
pattern = "mcpeapsunterstrichhd.dev"
custom_domain = true

# ── Dev branch ──
[env.dev]
name = "mcpeapsunterstrichhd-dev"
workers_dev = true

[[env.dev.routes]]
pattern = "dev.mcpeapsunterstrichhd.dev"
custom_domain = true

[[env.dev.routes]]
pattern = "www.dev.mcpeapsunterstrichhd.dev"
custom_domain = true
